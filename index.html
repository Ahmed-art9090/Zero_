async function createUniqueId() {
    const maxAttempts = 10;
    for (let attempt = 0; attempt < maxAttempts; attempt++) {
        let newId = "";
        for (let i = 0; i < 13; i++) {
            newId += Math.floor(Math.random() * 10);
        }
        // ط§ظ„طھط­ظ‚ظ‚ ظ…ظ† ظˆط¬ظˆط¯ظ‡ ظپظٹ ظ‚ط§ط¹ط¯ط© ط§ظ„ط¨ظٹط§ظ†ط§طھ
        const snapshot = await get(ref(db, "members"));
        if (snapshot.exists()) {
            const data = snapshot.val();
            let exists = false;
            for (let key in data) {
                if (decrypt(data[key].from) === newId) {
                    exists = true;
                    break;
                }
            }
            if (!exists) return newId;
        } else {
            return newId;
        }
    }
    return null; // ظپط´ظ„ ط¨ط¹ط¯ ط§ظ„ظ…ط­ط§ظˆظ„ط§طھ
}

// ط¯ط§ظ„ط© ظ„ظ„طھط­ظ‚ظ‚ ظ…ظ† ظˆط¬ظˆط¯ ط§ط³ظ… ط§ظ„ظ…ط³طھط®ط¯ظ…
async function checkUsernameExists(username) {
    const snapshot = await get(ref(db, "members"));
    if (!snapshot.exists()) return false;
    const data = snapshot.val();
    for (let key in data) {
        if (decrypt(data[key].user_name) === username) {
            return true;
        }
    }
    return false;
}

let moacct= ""
window.agree = function(id){
  set(ref(db, id + "set"), { a: "agree" });
  console.log(id)
  moacct = id
  remove_in_requests()
}
window.disagree = function(id){
  set(ref(db, id + "set"), { a: "disagree" });
    console.log(id)
  moacct = id.slice(0,id.length-1)
  remove_in_requests()
  
}
function remove_in_requests(){
  get(ref(db, "requests")).then(snap => {
    const data = snap.val();
    if(!data) return;

    Object.entries(data).forEach(([key, value]) => {
      if(decrypt(value.from) === moacct){
        remove(ref(db, "requests/" + key));
      }
    });
  });
}
