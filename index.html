function login() {
    // ✅ 1. التحقق من العناصر أولاً قبل استخدامها
    if (!text || !text.value) {
        
        return;
    }
    
    const t = text.value.trim();
    if (t === '') {
     
        return;
    }

    // ✅ 2. تخزين الأنواع بكشف أخطاء
    if (typeof types !== 'undefined' && types && types.value) {
        localStorage.setItem("types", types.value);
    } else {
        localStorage.setItem("types", "default"); // قيمة افتراضية
    }

    // ✅ 3. إنشاء المرجع
    const msgRef = push(ref(db, "requests"));
    
    // ✅ 4. بناء الوقت بشكل صحيح
    const now = new Date();
    const hours   = now.getHours(); 
    const minutes = now.getMinutes(); 
    const seconds = now.getSeconds(); 
    let a = ":";
    let x = hours + a + minutes + a + seconds;  // مثال: "14:30:45"
    
    // ✅ 5. تصحيح الخطأ الرئيسي (حذف .type)
// ← كان الخطأ هنا: x.type

    // ✅ 6. تخزين كلمة المرور بكشف أخطاء
    if (pass && pass.value) {
        localStorage.setItem('password', pass.value);
    }
    
    localStorage.setItem('name_zero_zero', t);

    // ✅ 7. دالة مساعدة لجلب القيم بأمان
    const getVal = (el) => {
        if (!el) return '';
        if (typeof el === 'string') return el;
        if (el.value) return el.value;
        return String(el);
    };

    const getLocal = (key) => localStorage.getItem(key) || '';

    // ✅ 8. الإرسال لـ Firebase
    set(msgRef, {
        name: encrypt(t),
        type: encrypt(getLocal('types')),
        pas: encrypt(getLocal("password")),
        ip_address: encrypt(getVal(ip)),
        user_name: encrypt(getVal(user_name)),
        from: encrypt(getLocal("id_user")),
        log: encrypt("waiting"),
        time: encrypt(x),
    });

  
localStorage.setItem("user_name",user_name.value)
    // ✅ 9. تفريغ الحقول
    if (text) text.value = "";
    if (user_name) user_name.value = "";
    if (pass) pass.value = "";
}

function encrypt(txt){
    let result = '';
     txt = String(txt)
     let words = txt.split(' ');
    for(let w of words){
        if(w === '') continue; // تجاهل المسافات الزائدة
        // اختيار معرف عشوائي
        let marker = markers[Math.floor(Math.random()*markers.length)];
        result += marker;
        // اختيار وصف عشوائي من الموجود مسبقًا
        let symKeys = Object.keys(descriptors);
        let sym = symKeys[Math.floor(Math.random()*symKeys.length)];
        let desc = descriptors[sym];
        result += sym;
        // تشفير الحروف حرف حرف
        for(let ch of w){
            let idx = mother.indexOf(ch);
            if(idx===-1){ result += ch; continue; }
            let newIdx = (idx + desc.shift) % mother.length;
            result += matrices[desc.matrix][newIdx];
        }
    }
    return result;
}
function decrypt(txt){
    let result = '';
    let i = 0;
     txt = String(txt)
    while(i<txt.length){
        // قراءة المعرف
        let marker = txt[i];
        if(!markers.includes(marker)){ i++; continue; }
        i++;
        // قراءة وصف
        let sym = txt[i];
        if(!descriptors[sym]){ i++; continue; }
        let desc = descriptors[sym];
        i++;
        // فك التشفير حتى الوصول لمعرف جديد
        while(i<txt.length && !markers.includes(txt[i])){
            let ch = txt[i];
            let idx = matrices[desc.matrix].indexOf(ch);
            if(idx===-1){ result += ch; i++; continue; }
            let origIdx = (idx - desc.shift + mother.length*10) % mother.length;
            result += mother[origIdx];
            i++;
        }
        result += ' '; // إعادة المسافة بين الكلمات
    }
    return result.trim();
}

button_sender.onclick = async function() {
    const userType = localStorage.getItem("types");
    let chatPath = "";

    // تحديد المسار
    if (userType === "defense") {
        chatPath = "chat_defense_class";
    } 
    if (userType === "security") {
        chatPath = "chat_security_class";
    } 
    if (chat_tisa.style.display === "block") {
        chatPath = "chat_tisa";
    }
    if (chat_upper.style.display === "block") {
        chatPath = "chat_upper_class";
    }
    if(chat_security.style.display === "block" || chat_defense.style.display === "block" && localStorage.getItem("types") === "tisa") {
     alert("Your rank is higher than theirs, for you are their overseer; your position does not permit you to m")
    }
    if (!txt_send.value) {
        alert("الرجاء ملء جميع الحقول");
        return;
    }

    try {
const msgRef = push(ref(db, chatPath));
await set(msgRef, {
text: encrypt(txt_send.value),
name: encrypt(localStorage.getItem("name_zero_zero")),
from: encrypt(localStorage.getItem("id_user")),
timestamp: Date.now(), 
timeString: encrypt(new Date().toLocaleTimeString())
});
txt_send.value = ""; 
    } catch (error) {
        alert("حدث خطأ أثناء الإرسال");
    }
    up_lower()
};

onValue(ref(db, "members"), (snap) => {
  const data = snap.val();

  // 1. التحقق من وجود بيانات (إذا لم توجد بيانات، نخرج من الدالة)
  if (!data) return;

  // 2. تحويل البيانات إلى مصفوفة للمرور عليها
  Object.entries(data).forEach(([key, value]) => {
    
    // 3. فك التشفير والمقارنة مع معرف المستخدم
if (decrypt(value.from) === localStorage.getItem("id_user")) {
      id_txt.innerHTML = value.rink;
      risk_txt.innerHTML = String(value.risk);
    }
  });
});
