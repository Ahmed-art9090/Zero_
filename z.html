function login() {
    // ✅ 1. التحقق من العناصر أولاً قبل استخدامها
    if (!text || !text.value) {
        
        return;
    }
    
    const t = text.value.trim();
    if (t === '') {
     
        return;
    }

    // ✅ 2. تخزين الأنواع بكشف أخطاء
    if (typeof types !== 'undefined' && types && types.value) {
        localStorage.setItem("types", types.value);
    } else {
        localStorage.setItem("types", "default"); // قيمة افتراضية
    }

    // ✅ 3. إنشاء المرجع
    const msgRef = push(ref(db, "requests"));
    
    // ✅ 4. بناء الوقت بشكل صحيح
    const now = new Date();
    const hours   = now.getHours(); 
    const minutes = now.getMinutes(); 
    const seconds = now.getSeconds(); 
    let a = ":";
    let x = hours + a + minutes + a + seconds;  // مثال: "14:30:45"
    
    // ✅ 5. تصحيح الخطأ الرئيسي (حذف .type)
// ← كان الخطأ هنا: x.type

    // ✅ 6. تخزين كلمة المرور بكشف أخطاء
    if (pass && pass.value) {
        localStorage.setItem('pas', pass.value);
    }
    
    localStorage.setItem('name_zero_zero', t);

    // ✅ 7. دالة مساعدة لجلب القيم بأمان
    const getVal = (el) => {
        if (!el) return '';
        if (typeof el === 'string') return el;
        if (el.value) return el.value;
        return String(el);
    };

    const getLocal = (key) => localStorage.getItem(key) || '';

    // ✅ 8. الإرسال لـ Firebase
    set(msgRef, {
        name: encrypt(t),
        type: encrypt(getLocal('types')),
        pas: encrypt(getLocal("pas")),
        ip_address: encrypt(getVal(ip)),
        user_name: encrypt(getVal(user_name)),
        from: getLocal("id_user"),
        log: encrypt("waiting"),
        time: encrypt(x),
    });

  
localStorage.setItem("user_name",user_name.value)
    // ✅ 9. تفريغ الحقول
    if (text) text.value = "";
    if (user_name) user_name.value = "";
    if (pass) pass.value = "";
}


send.onclick = async function() {
    // 1. إنشاء ID فريد
    let uniqueId = await createUniqueId();
    if (!uniqueId) {
        console.error("فشل إنشاء معرف فريد");
        return;
    }
    localStorage.setItem('id_user', uniqueId);
    
    // 2. التحقق من اسم المستخدم
    const isUsernameTaken = await checkUsernameExists(user_name.value);
    if (isUsernameTaken) {
        user_name.value = "it used";
        return; // لا ننفذ login
    }
    
    // 3. كل شيء جيد، ننفذ login
    login();
};

// دالة لإنشاء معرف فريد
async function createUniqueId() {
    const maxAttempts = 10;
    for (let attempt = 0; attempt < maxAttempts; attempt++) {
        let newId = "";
        for (let i = 0; i < 13; i++) {
            newId += Math.floor(Math.random() * 10);
        }
        // التحقق من وجوده في قاعدة البيانات
        const snapshot = await get(ref(db, "members"));
        if (snapshot.exists()) {
            const data = snapshot.val();
            let exists = false;
            for (let key in data) {
                if (decrypt(data[key].from) === newId) {
                    exists = true;
                    break;
                }
            }
            if (!exists) return newId;
        } else {
            return newId;
        }
    }
    return null; // فشل بعد المحاولات
}

// دالة للتحقق من وجود اسم المستخدم
async function checkUsernameExists(username) {
    const snapshot = await get(ref(db, "members"));
    if (!snapshot.exists()) return false;
    const data = snapshot.val();
    for (let key in data) {
        if (decrypt(data[key].user_name) === username) {
            return true;
        }
    }
    return false;
}

function encrypt(txt) {
    let result = '';
    txt = String(txt);
    let words = txt.split(' ');
    for (let w of words) {
        if (w === '') continue;
        
        // اختيار ماركر عشوائي
        let marker = markers[Math.floor(Math.random() * markers.length)];
        result += marker;
        
        // اختيار وصف عشوائي لهذه الكلمة
        let symKeys = Object.keys(descriptors);
        let sym = symKeys[Math.floor(Math.random() * symKeys.length)];
        let desc = descriptors[sym];
        result += sym;
        
        // تشفير كل حرف في الكلمة باستخدام نفس الوصف
        for (let ch of w) {
            let idx = mother.indexOf(ch);
            // ========== التعديل 2: التحقق من وجود الحرف في mother ==========
            if (idx === -1) {
                throw new Error(`الحرف '${ch}' غير موجود في المصفوفة الأم. تأكد من أن النص يحتوي فقط على حروف المصفوفة.`);
            }
            let newIdx = (idx + desc.shift) % mother.length;
            result += matrices[desc.matrix][newIdx];
        }
    }
    return result;
}
function decrypt(txt) {
    let result = '';
    let i = 0;
    txt = String(txt);
    while (i < txt.length) {
        // قراءة الماركر
        let marker = txt[i];
        if (!markers.includes(marker)) {
            i++;
            continue;
        }
        i++;
        // قراءة رمز الوصف
        if (i >= txt.length) break;
        let sym = txt[i];
        // ========== التعديل 3: التحقق من صحة رمز الوصف ==========
        if (!descriptors[sym]) {
            throw new Error(`رمز الوصف '${sym}' غير معروف. تأكد من صحة النص المشفر.`);
        }
        let desc = descriptors[sym];
        i++;
        // فك تشفير الكلمة حتى الماركر التالي
        let wordDecrypted = '';
        while (i < txt.length && !markers.includes(txt[i])) {
            let ch = txt[i];
            let idx = matrices[desc.matrix].indexOf(ch);
            if (idx === -1) {
                // إذا كان الحرف غير موجود في المصفوفة الجانبية (لا يجب أن يحدث)
                throw new Error(`الحرف المشفر '${ch}' غير موجود في المصفوفة ${desc.matrix}`);
            }
            let origIdx = (idx - desc.shift + mother.length * 10) % mother.length;
            wordDecrypted += mother[origIdx];
            i++;
        }
        result += wordDecrypted + ' ';
    }
    return result.trim();
}

let moacct= ""
window.agree = function(id){
  set(ref(db, id + "set"), { a: "agree" });
  console.log(id)
  moacct = id
  remove_in_requests()
}
window.disagree = function(id){
  set(ref(db, id + "set"), { a: "disagree" });
    console.log(id)
  moacct = id.slice(0,id.length-1)
  remove_in_requests()
  
}
function remove_in_requests(){
  get(ref(db, "requests")).then(snap => {
    const data = snap.val();
    if(!data) return;

    Object.entries(data).forEach(([key, value]) => {
      if(value.from === moacct){
        remove(ref(db, "requests/" + key));
      }
    });
  });
}
